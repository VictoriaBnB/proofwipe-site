<!doctype html>
<!-- Mirrors the same BATCH drive card after a successful firmware Purge:
     "PURGED ✔" state + "Firmware Purge complete" + PDF/HTML certificate buttons. -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="mockup.css"></head>
<body style="padding:14px;">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span class="section-header">BATCH</span>
      <button class="btn" style="padding:8px 14px;font-size:13px;">
        <span class="glyph" style="margin-right:8px;font-size:12px;">&#xE8A5;</span>Batch summary
      </button>
    </div>
    <div class="secondary" style="margin-bottom:10px;">1 drive · finished</div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span style="font-weight:600;font-size:14px;">Samsung SSD 970 EVO Plus 500GB</span>
        <span style="font-weight:700;font-size:12px;color:var(--state-done);">PURGED &#x2714;</span>
      </div>
      <div class="secondary" style="margin-top:3px;">SN S4EVNM0N705193H · NVMe Firmware Purge (Sanitize / Format)</div>
      <div class="progress" style="margin-top:8px;"><i style="width:100%;"></i></div>
      <div class="secondary" style="margin-top:6px;">Firmware Purge complete</div>
      <div style="margin-top:8px;display:flex;gap:8px;">
        <button class="btn" style="padding:5px 12px;font-size:12px;">PDF</button>
        <button class="btn" style="padding:5px 12px;font-size:12px;">HTML</button>
      </div>
    </div>
  </div>
</body></html>
