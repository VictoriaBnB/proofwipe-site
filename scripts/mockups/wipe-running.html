<!doctype html>
<!-- Mirrors MainWindow.xaml BATCH column while a wipe runs.
     StateText/StateColor/ProgressText formats from BatchDriveViewModel. -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="mockup.css"></head>
<body style="padding:14px;">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span class="section-header">BATCH</span>
      <button class="btn btn-danger" style="padding:8px 16px;font-size:13px;">
        <span class="glyph" style="color:#fff;margin-right:8px;font-size:12px;">&#xE768;</span>START BATCH
      </button>
    </div>
    <div class="secondary" style="margin-bottom:10px;">1 drive armed · running</div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <span style="font-weight:600;font-size:14px;">Samsung SSD 970 EVO Plus 500GB</span>
        <span style="font-weight:700;font-size:12px;color:var(--state-running);">RUNNING</span>
      </div>
      <div class="secondary" style="margin-top:3px;">SN S4EVNM0N705193H · NVMe Firmware Purge (Sanitize / Format)</div>
      <div class="progress" style="margin-top:8px;"><i style="width:84%;"></i></div>
      <div class="secondary" style="margin-top:6px;">Verifying · 84%</div>
      <div style="margin-top:8px;">
        <button class="btn" style="padding:5px 10px;font-size:12px;">Cancel this drive</button>
      </div>
    </div>
  </div>
</body></html>
