<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" width="1000" height="640" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <title>Illustration of the ProofWipe certificate database window</title>
  <desc>A sources panel on the left lists three certificate sources; the results list on the right shows five certificates, four marked Verified with a green fingerprint badge and one marked Alert with a red badge for a fingerprint mismatch.</desc>

  <!-- window -->
  <rect x="1" y="1" width="998" height="638" rx="16" fill="#ffffff" stroke="#e4e8ee" stroke-width="2"/>

  <!-- header -->
  <text x="32" y="36" font-size="18" font-weight="700" fill="#141922">ProofWipe  ·  Certificate database</text>
  <rect x="836" y="18" width="132" height="26" rx="13" fill="#eef2ff"/>
  <text x="902" y="35" font-size="12.5" font-weight="600" fill="#3e7bfa" text-anchor="middle">Business tier</text>
  <line x1="1" y1="56" x2="999" y2="56" stroke="#e4e8ee" stroke-width="2"/>

  <!-- sidebar -->
  <rect x="2" y="57" width="248" height="581" fill="#f4f6f9"/>
  <line x1="250" y1="56" x2="250" y2="639" stroke="#e4e8ee" stroke-width="2"/>
  <text x="32" y="92" font-size="12" font-weight="700" letter-spacing="1.2" fill="#5a6472">SOURCES</text>

  <!-- source item 1 (selected) -->
  <rect x="18" y="104" width="216" height="52" rx="10" fill="#ffffff" stroke="#3e7bfa" stroke-width="1.5"/>
  <rect x="32" y="120" width="22" height="18" rx="3" fill="#eaf1ff" stroke="#3e7bfa" stroke-width="1.5"/>
  <text x="66" y="126" font-size="14" font-weight="600" fill="#141922">Desktop app folder</text>
  <text x="66" y="145" font-size="12.5" fill="#5a6472">128 certificates</text>

  <!-- source item 2 -->
  <rect x="32" y="176" width="22" height="18" rx="3" fill="#f4f6f9" stroke="#5a6472" stroke-width="1.5"/>
  <text x="66" y="182" font-size="14" font-weight="600" fill="#141922">USB stick (field)</text>
  <text x="66" y="201" font-size="12.5" fill="#5a6472">46 certificates</text>

  <!-- source item 3 -->
  <rect x="32" y="228" width="22" height="18" rx="3" fill="#f4f6f9" stroke="#5a6472" stroke-width="1.5"/>
  <text x="66" y="234" font-size="14" font-weight="600" fill="#141922">Network-boot server</text>
  <text x="66" y="253" font-size="12.5" fill="#5a6472">213 certificates</text>

  <!-- add source -->
  <rect x="18" y="284" width="216" height="42" rx="10" fill="none" stroke="#c3cbd6" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="126" y="310" font-size="13.5" font-weight="600" fill="#5a6472" text-anchor="middle">+  Add source</text>

  <text x="32" y="596" font-size="12" font-weight="700" letter-spacing="1.2" fill="#5a6472">TOTAL</text>
  <text x="32" y="618" font-size="14" fill="#141922">387 certificates indexed</text>

  <!-- search bar -->
  <rect x="282" y="76" width="560" height="40" rx="10" fill="#ffffff" stroke="#e4e8ee" stroke-width="1.5"/>
  <circle cx="306" cy="96" r="6.5" fill="none" stroke="#5a6472" stroke-width="1.8"/>
  <line x1="311" y1="101" x2="317" y2="107" stroke="#5a6472" stroke-width="1.8" stroke-linecap="round"/>
  <text x="330" y="101" font-size="14" fill="#8a93a2">Search serial, model, or client label…</text>

  <!-- filter chips -->
  <g font-size="12.5" font-weight="600" fill="#5a6472">
    <rect x="282" y="130" width="104" height="30" rx="15" fill="#f4f6f9" stroke="#e4e8ee" stroke-width="1.5"/>
    <text x="334" y="150" text-anchor="middle">Method: Any</text>
    <rect x="396" y="130" width="104" height="30" rx="15" fill="#f4f6f9" stroke="#e4e8ee" stroke-width="1.5"/>
    <text x="448" y="150" text-anchor="middle">Result: Pass</text>
    <rect x="510" y="130" width="110" height="30" rx="15" fill="#f4f6f9" stroke="#e4e8ee" stroke-width="1.5"/>
    <text x="565" y="150" text-anchor="middle">Status: All</text>
    <rect x="630" y="130" width="150" height="30" rx="15" fill="#f4f6f9" stroke="#e4e8ee" stroke-width="1.5"/>
    <text x="705" y="150" text-anchor="middle">Client: Northline Ltd</text>
  </g>

  <!-- results header -->
  <text x="282" y="196" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#8a93a2">DRIVE</text>
  <text x="512" y="196" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#8a93a2">METHOD</text>
  <text x="600" y="196" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#8a93a2">DATE</text>
  <text x="712" y="196" font-size="11.5" font-weight="700" letter-spacing="0.6" fill="#8a93a2">FINGERPRINT</text>
  <line x1="282" y1="206" x2="968" y2="206" stroke="#e4e8ee" stroke-width="1.5"/>

  <!-- rows -->
  <!-- row template height 66 -->
  <g font-size="14">
    <!-- row 1 -->
    <text x="282" y="238" font-weight="600" fill="#141922">Samsung SSD 870 EVO</text>
    <text x="282" y="256" font-size="12.5" fill="#5a6472" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">S5R9NJ0T204W</text>
    <text x="512" y="240" fill="#5a6472">Purge</text>
    <text x="600" y="240" fill="#5a6472">2026-07-02</text>
    <rect x="712" y="226" width="112" height="26" rx="13" fill="#e7f4ec"/>
    <path d="M726 239 l5 5 l10 -11" fill="none" stroke="#158048" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="748" y="243" font-size="12.5" font-weight="600" fill="#158048">Verified</text>
    <line x1="282" y1="272" x2="968" y2="272" stroke="#eef1f5" stroke-width="1.5"/>

    <!-- row 2 -->
    <text x="282" y="304" font-weight="600" fill="#141922">WD Blue HDD 1TB</text>
    <text x="282" y="322" font-size="12.5" fill="#5a6472" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">WD-WXA1E8841Q</text>
    <text x="512" y="306" fill="#5a6472">Clear</text>
    <text x="600" y="306" fill="#5a6472">2026-07-02</text>
    <rect x="712" y="292" width="112" height="26" rx="13" fill="#e7f4ec"/>
    <path d="M726 305 l5 5 l10 -11" fill="none" stroke="#158048" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="748" y="309" font-size="12.5" font-weight="600" fill="#158048">Verified</text>
    <line x1="282" y1="338" x2="968" y2="338" stroke="#eef1f5" stroke-width="1.5"/>

    <!-- row 3 -->
    <text x="282" y="370" font-weight="600" fill="#141922">Crucial MX500 500GB</text>
    <text x="282" y="388" font-size="12.5" fill="#5a6472" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">2148E29C3F0A</text>
    <text x="512" y="372" fill="#5a6472">Purge</text>
    <text x="600" y="372" fill="#5a6472">2026-06-28</text>
    <rect x="712" y="358" width="112" height="26" rx="13" fill="#e7f4ec"/>
    <path d="M726 371 l5 5 l10 -11" fill="none" stroke="#158048" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="748" y="375" font-size="12.5" font-weight="600" fill="#158048">Verified</text>
    <line x1="282" y1="404" x2="968" y2="404" stroke="#eef1f5" stroke-width="1.5"/>

    <!-- row 4 (ALERT) -->
    <rect x="266" y="410" width="710" height="52" rx="8" fill="#fdf2f2"/>
    <text x="282" y="436" font-weight="600" fill="#141922">Seagate Barracuda 2TB</text>
    <text x="282" y="454" font-size="12.5" fill="#5a6472" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">ZA10C877F  ·  log no longer matches</text>
    <text x="512" y="438" fill="#5a6472">Clear</text>
    <text x="600" y="438" fill="#5a6472">2026-06-28</text>
    <rect x="712" y="424" width="98" height="26" rx="13" fill="#fbeceb"/>
    <circle cx="728" cy="437" r="7" fill="none" stroke="#cd3a3f" stroke-width="2"/>
    <line x1="728" y1="433.5" x2="728" y2="438.5" stroke="#cd3a3f" stroke-width="2" stroke-linecap="round"/>
    <circle cx="728" cy="441" r="1.1" fill="#cd3a3f"/>
    <text x="742" y="441" font-size="12.5" font-weight="700" fill="#cd3a3f">Alert</text>

    <!-- row 5 -->
    <text x="282" y="500" font-weight="600" fill="#141922">Kingston A400 240GB</text>
    <text x="282" y="518" font-size="12.5" fill="#5a6472" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">50026B7268C16B1</text>
    <text x="512" y="502" fill="#5a6472">Purge</text>
    <text x="600" y="502" fill="#5a6472">2026-06-27</text>
    <rect x="712" y="488" width="112" height="26" rx="13" fill="#e7f4ec"/>
    <path d="M726 501 l5 5 l10 -11" fill="none" stroke="#158048" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="748" y="505" font-size="12.5" font-weight="600" fill="#158048">Verified</text>
  </g>

  <!-- footer status -->
  <line x1="266" y1="560" x2="968" y2="560" stroke="#e4e8ee" stroke-width="1.5"/>
  <text x="282" y="590" font-size="13" fill="#5a6472">5 shown · 4 verified · <tspan fill="#cd3a3f" font-weight="600">1 alert</tspan> · re-checked on import</text>
  <rect x="836" y="574" width="132" height="34" rx="8" fill="#3e7bfa"/>
  <text x="902" y="596" font-size="13.5" font-weight="600" fill="#ffffff" text-anchor="middle">Export report</text>
</svg>
